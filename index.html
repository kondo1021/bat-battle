<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAT BATTLE</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; justify-content:center; align-items:center; height:100vh; font-family:'Courier New',monospace; overflow:hidden; user-select:none; }
#app { position:relative; width:800px; height:600px; }
canvas { display:block; background:#000; }
.screen { position:absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.92); color:#fff; z-index:10; }
.screen.active { display:flex; }
h1 { font-size:48px; color:#f84; margin-bottom:30px; text-shadow:3px 3px 0 #a40; letter-spacing:4px; }
.btn { padding:12px 32px; margin:8px; font-size:18px; font-family:inherit; background:#333; color:#fff; border:2px solid #f84; cursor:pointer; transition:0.2s; min-width:220px; }
.btn:hover { background:#f84; color:#000; }
.btn.small { min-width:120px; font-size:14px; padding:8px 20px; }
.subtitle { color:#aaa; margin-bottom:20px; font-size:14px; }
.section { margin:12px 0; text-align:center; }
.section label { display:block; margin-bottom:4px; color:#f84; font-size:14px; }
.status { font-size:14px; margin:8px 0; }
.status.ok { color:#0f0; }
.status.wait { color:#fa0; }
.status.err { color:#f44; }
#hud { position:absolute; top:4px; left:4px; color:#fff; font-size:13px; z-index:5; pointer-events:none; }
.controls-info { color:#888; font-size:11px; margin-top:16px; text-align:center; line-height:1.8; }
.room-code { font-size:64px; color:#0f0; letter-spacing:16px; font-weight:bold; margin:16px 0; text-shadow:0 0 20px #0f0; }
.room-input { font-size:36px; letter-spacing:12px; width:200px; text-align:center; background:#222; color:#0f0; border:2px solid #0f0; padding:8px; font-family:inherit; }
</style>
</head>
<body>
<div id="app">
<canvas id="c" width="800" height="600"></canvas>
<div id="hud"></div>

<!-- TITLE -->
<div id="titleScreen" class="screen active">
<h1>BAT BATTLE</h1>
<p class="subtitle">- バットで吹き飛ばせ！ -</p>
<div class="section"><label>-- LOCAL --</label>
<button class="btn" onclick="startLocal(1)">1P vs CPU</button>
<button class="btn" onclick="startLocal(2)">2P LOCAL</button>
<button class="btn" onclick="startLocal(3)">3P LOCAL</button>
</div>
<div class="section"><label>-- ONLINE --</label>
<button class="btn" onclick="showLobby(2)">2P ONLINE</button>
<button class="btn" onclick="showLobby(3)">3P ONLINE</button>
</div>
<div class="controls-info">
移動: WASD / 矢印キー<br>
爆弾: 右クリック | バット: 左クリック長押し→離す
</div>
</div>

<!-- LOBBY -->
<div id="lobbyScreen" class="screen">
<h1 style="font-size:32px;">ONLINE LOBBY</h1>
<div id="lobbyChoice">
<button class="btn" onclick="netHost()">部屋を作る</button>
<button class="btn" onclick="netJoinUI()">部屋に参加</button>
</div>
<div id="lobbyHostView" style="display:none;">
<p style="color:#aaa;">部屋コードを相手に教えてください</p>
<div class="room-code" id="roomCodeDisplay">----</div>
<p id="hostStatus" class="status wait">接続待ち...</p>
<button class="btn" id="btnStart" style="display:none;" onclick="netStartGame()">ゲーム開始</button>
</div>
<div id="lobbyJoinView" style="display:none;">
<p style="color:#aaa;">部屋コードを入力してください</p>
<input type="text" class="room-input" id="roomCodeInput" maxlength="4" placeholder="0000">
<br>
<button class="btn" style="margin-top:12px;" onclick="netJoinRoom()">接続</button>
<p id="joinStatus" class="status wait"></p>
</div>
<br>
<button class="btn small" onclick="showTitle()">戻る</button>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
<h1 id="resultText" style="font-size:36px;"></h1>
<div id="resultButtons">
<button class="btn" id="btnRematch" onclick="requestRematch()">再戦</button>
<button class="btn" onclick="quitToTitle()">やめる</button>
</div>
<p id="rematchStatus" class="status" style="display:none;"></p>
</div>
</div>

<script>
// ============================================
// CONSTANTS
// ============================================
const COLS = 13, ROWS = 13, CELL = 40;
const FIELD_W = COLS * CELL, FIELD_H = ROWS * CELL;
const FIELD_X = (800 - FIELD_W) / 2, FIELD_Y = (600 - FIELD_H) / 2;
const MOVE_SPEED = 150;
const CHARGE_MOVE_MULT = 0.4;
const MAX_CHARGE = 3.0;
const BOMB_FUSE = 3.0;
const BOMB_WARN = 1.0;
const BLAST_RANGE = 2;
const SHRINK_INTERVAL = 15;
const SHRINK_WARN = 5;
const MAX_BOMBS = 2;
const STUN_BASE = 0.5;
const STUN_MAX = 1.5;
const BAT_RANGE = 1.2;
const BAT_WIDTH = 0.8;
const BOMB_FLY_SPEED = 500;
const KNOCKBACK_SPEED = 600;
const PLAYER_SIZE = 28;
const COLORS = ['#4488ff','#ff4444','#44dd44','#cc44cc'];
const DIR_DX = [0, 0, -1, 1];
const DIR_DY = [-1, 1, 0, 0];

// ============================================
// GLOBALS
// ============================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let gameMode = null;
let playerCount = 2;
let localPlayerIdx = 0;
let players = [];
let bombs = [];
let effects = [];
let field = [];
let shrinkLevel = 0;
let shrinkTimer = 0;
let gameTime = 0;
let gameRunning = false;
let lastTs = 0;

let keys = {};
let mouseDown = false;
let mouseDownTime = 0;
let rightClicked = false;

// Network (PeerJS)
let peer = null;
let netRole = null;
let netConns = [];
let onlinePlayers = 2;
let remoteInputs = {};
let netSyncTimer = 0;
let rematchVotes = new Set();

// ============================================
// INPUT
// ============================================
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && ['KeyC','KeyV','KeyA','KeyX'].includes(e.code)) return;
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  keys[e.code] = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousedown', e => {
  if (!gameRunning) return;
  if (e.button === 0) { mouseDown = true; mouseDownTime = 0; }
  if (e.button === 2) { rightClicked = true; }
  e.preventDefault();
});
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; e.preventDefault(); });
document.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

function getLocalInput(playerIdx) {
  let inp = { up:false, down:false, left:false, right:false, bomb:false, charging:false, chargeTime:0, swingRelease:false };
  if (gameMode === 'local') {
    if (playerIdx === 0) {
      // 1P vs CPU: WASD+矢印 両方OK。2P以上: WASDのみ
      const arrowOk = !players.some((p, i) => i >= 1 && !p.isCpu);
      inp.up = !!keys['KeyW'] || (arrowOk && !!keys['ArrowUp']);
      inp.down = !!keys['KeyS'] || (arrowOk && !!keys['ArrowDown']);
      inp.left = !!keys['KeyA'] || (arrowOk && !!keys['ArrowLeft']);
      inp.right = !!keys['KeyD'] || (arrowOk && !!keys['ArrowRight']);
      inp.bomb = rightClicked; inp.charging = mouseDown; inp.chargeTime = mouseDownTime;
    } else if (playerIdx === 1) {
      inp.up = !!keys['ArrowUp']; inp.down = !!keys['ArrowDown'];
      inp.left = !!keys['ArrowLeft']; inp.right = !!keys['ArrowRight'];
      inp.bomb = !!keys['Numpad1'] || !!keys['Slash'];
      inp.charging = !!keys['Numpad0'] || !!keys['Period'];
      inp.chargeTime = players[1] ? players[1].chargeTime : 0;
    } else if (playerIdx === 2) {
      inp.up = !!keys['KeyI']; inp.down = !!keys['KeyK'];
      inp.left = !!keys['KeyJ']; inp.right = !!keys['KeyL'];
      inp.bomb = !!keys['KeyN'];
      inp.charging = !!keys['KeyB'];
      inp.chargeTime = players[2] ? players[2].chargeTime : 0;
    }
  } else {
    inp.up = !!keys['KeyW'] || !!keys['ArrowUp'];
    inp.down = !!keys['KeyS'] || !!keys['ArrowDown'];
    inp.left = !!keys['KeyA'] || !!keys['ArrowLeft'];
    inp.right = !!keys['KeyD'] || !!keys['ArrowRight'];
    inp.bomb = rightClicked;
    inp.charging = mouseDown;
    inp.chargeTime = mouseDownTime;
  }
  return inp;
}

// ============================================
// FIELD
// ============================================
function initField() {
  field = [];
  for (let r = 0; r < ROWS; r++) {
    field[r] = [];
    for (let c = 0; c < COLS; c++) field[r][c] = 0;
  }
  shrinkLevel = 0;
  shrinkTimer = 0;
}

function cellActive(r, c) {
  return r >= 0 && r < ROWS && c >= 0 && c < COLS && field[r][c] !== 2;
}

function updateField(dt) {
  shrinkTimer += dt;
  const nextShrink = SHRINK_INTERVAL;
  const warnStart = nextShrink - SHRINK_WARN;

  if (shrinkTimer >= warnStart && shrinkLevel < 6) {
    const sl = shrinkLevel;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (field[r][c] === 2) continue;
        if (r < sl + 1 || r >= ROWS - sl - 1 || c < sl + 1 || c >= COLS - sl - 1) {
          if (r >= sl && r < ROWS - sl && c >= sl && c < COLS - sl) {
            field[r][c] = 1;
          }
        }
      }
    }
  }

  if (shrinkTimer >= nextShrink && shrinkLevel < 6) {
    const sl = shrinkLevel;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (r < sl + 1 || r >= ROWS - sl - 1 || c < sl + 1 || c >= COLS - sl - 1) {
          field[r][c] = 2;
        }
      }
    }
    shrinkLevel++;
    shrinkTimer = 0;
    players.forEach(p => {
      if (!p.alive) return;
      const gc = Math.floor((p.x - FIELD_X) / CELL);
      const gr = Math.floor((p.y - FIELD_Y) / CELL);
      if (!cellActive(gr, gc)) eliminatePlayer(p);
    });
    bombs = bombs.filter(b => b.flying || cellActive(b.row, b.col));
  }
}

// ============================================
// PLAYER
// ============================================
function createPlayer(idx, col, row, isCpu) {
  return {
    idx, x: FIELD_X + col * CELL + CELL / 2, y: FIELD_Y + row * CELL + CELL / 2,
    dir: 1, alive: true, isCpu,
    chargeTime: 0, charging: false, stunTime: 0,
    knockback: false, kbVx: 0, kbVy: 0, kbTime: 0,
    bombCount: 0, swingCooldown: 0,
    eliminateAnim: 0, eliminateDir: 0
  };
}

function eliminatePlayer(p) {
  if (!p.alive) return;
  p.alive = false;
  p.eliminateAnim = 1.0;
  effects.push({ type: 'elim', x: p.x, y: p.y, time: 0.5 });
}

function playerGridPos(p) {
  return { col: Math.floor((p.x - FIELD_X) / CELL), row: Math.floor((p.y - FIELD_Y) / CELL) };
}

function updatePlayer(p, dt, inp) {
  if (!p.alive) {
    if (p.eliminateAnim > 0) {
      p.eliminateAnim -= dt * 2;
      p.x += DIR_DX[p.dir] * KNOCKBACK_SPEED * dt;
      p.y += DIR_DY[p.dir] * KNOCKBACK_SPEED * dt;
    }
    return;
  }
  if (p.stunTime > 0) { p.stunTime -= dt; return; }
  if (p.knockback) {
    p.x += p.kbVx * dt; p.y += p.kbVy * dt;
    p.kbTime -= dt;
    if (p.kbTime <= 0) p.knockback = false;
    const gc = Math.floor((p.x - FIELD_X) / CELL);
    const gr = Math.floor((p.y - FIELD_Y) / CELL);
    if (!cellActive(gr, gc) || p.x < FIELD_X || p.x >= FIELD_X + FIELD_W || p.y < FIELD_Y || p.y >= FIELD_Y + FIELD_H) {
      eliminatePlayer(p);
    }
    return;
  }

  let dx = 0, dy = 0;
  if (inp.up) { dy = -1; p.dir = 0; }
  if (inp.down) { dy = 1; p.dir = 1; }
  if (inp.left) { dx = -1; p.dir = 2; }
  if (inp.right) { dx = 1; p.dir = 3; }

  let speed = MOVE_SPEED;
  if (p.charging) speed *= CHARGE_MOVE_MULT;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  let nx = p.x + dx * speed * dt;
  let ny = p.y + dy * speed * dt;

  const margin = PLAYER_SIZE / 2 - 2;
  const minBound = shrinkLevel;
  const maxBound = 13 - shrinkLevel;
  nx = Math.max(FIELD_X + minBound * CELL + margin, Math.min(FIELD_X + maxBound * CELL - margin, nx));
  ny = Math.max(FIELD_Y + minBound * CELL + margin, Math.min(FIELD_Y + maxBound * CELL - margin, ny));
  p.x = nx; p.y = ny;

  if (p.swingCooldown > 0) p.swingCooldown -= dt;
  if (inp.charging && p.swingCooldown <= 0) {
    p.charging = true;
    p.chargeTime += dt;
    if (p.chargeTime > MAX_CHARGE) p.chargeTime = MAX_CHARGE;
  }
  if (p.charging && !inp.charging) {
    performSwing(p);
    p.charging = false; p.chargeTime = 0; p.swingCooldown = 0.3;
  }
  if (!inp.charging) p.charging = false;
  if (inp.bomb) placeBomb(p);
}

function performSwing(p) {
  const charge = p.chargeTime / MAX_CHARGE;
  const cx = p.x + DIR_DX[p.dir] * CELL * 0.8;
  const cy = p.y + DIR_DY[p.dir] * CELL * 0.8;
  const hw = BAT_WIDTH * CELL / 2, hl = BAT_RANGE * CELL / 2;
  let rx, ry, rw, rh;
  if (p.dir <= 1) { rx = cx - hw; ry = cy - hl; rw = hw * 2; rh = hl * 2; }
  else { rx = cx - hl; ry = cy - hw; rw = hl * 2; rh = hw * 2; }
  effects.push({ type: 'swing', x: cx, y: cy, dir: p.dir, time: 0.2, charge });

  players.forEach(t => {
    if (t === p || !t.alive || t.knockback) return;
    if (rectHit(t.x - PLAYER_SIZE/2, t.y - PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE, rx, ry, rw, rh)) {
      if (charge >= 0.95) {
        t.knockback = true; t.kbVx = DIR_DX[p.dir] * KNOCKBACK_SPEED;
        t.kbVy = DIR_DY[p.dir] * KNOCKBACK_SPEED; t.kbTime = 1.5; t.dir = p.dir;
      } else {
        t.stunTime = STUN_BASE + charge * (STUN_MAX - STUN_BASE);
        if (charge > 0.3) {
          const kb = charge * 3 * CELL;
          t.knockback = true; t.kbVx = DIR_DX[p.dir] * kb * 2;
          t.kbVy = DIR_DY[p.dir] * kb * 2; t.kbTime = 0.3;
        }
        t.charging = false; t.chargeTime = 0;
      }
      effects.push({ type: 'hit', x: t.x, y: t.y, time: 0.3 });
    }
  });

  bombs.forEach(b => {
    if (b.flying) return;
    const bx = FIELD_X + b.col * CELL, by = FIELD_Y + b.row * CELL;
    if (rectHit(bx, by, CELL, CELL, rx, ry, rw, rh)) {
      b.flying = true; b.flyDir = p.dir;
      b.flyDist = (2 + charge * 8) * CELL; b.flySpeed = BOMB_FLY_SPEED;
      b.fx = bx + CELL / 2; b.fy = by + CELL / 2; b.traveled = 0;
    }
  });
}

function rectHit(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

// ============================================
// BOMB
// ============================================
function placeBomb(p) {
  if (bombs.filter(b => b.owner === p.idx).length >= MAX_BOMBS) return;
  const g = playerGridPos(p);
  if (bombs.some(b => !b.flying && b.col === g.col && b.row === g.row)) return;
  if (!cellActive(g.row, g.col)) return;
  bombs.push({ owner: p.idx, col: g.col, row: g.row, timer: BOMB_FUSE, flying: false, fx: 0, fy: 0, flyDir: 0, flyDist: 0, flySpeed: 0, traveled: 0 });
}

function updateBombs(dt) {
  bombs.forEach(b => {
    b.timer -= dt;
    if (b.flying) {
      const mv = b.flySpeed * dt;
      b.fx += DIR_DX[b.flyDir] * mv; b.fy += DIR_DY[b.flyDir] * mv;
      b.traveled += mv;
      if (b.traveled >= b.flyDist) {
        b.flying = false;
        b.col = Math.floor((b.fx - FIELD_X) / CELL);
        b.row = Math.floor((b.fy - FIELD_Y) / CELL);
        if (!cellActive(b.row, b.col)) b.timer = -1;
      }
    }
    if (b.timer <= 0) explodeBomb(b);
  });
  bombs = bombs.filter(b => b.timer > -0.5);
}

function explodeBomb(b) {
  if (b.timer <= -0.5) return;
  b.timer = -0.5;
  let cx, cy;
  if (b.flying) { cx = Math.floor((b.fx - FIELD_X) / CELL); cy = Math.floor((b.fy - FIELD_Y) / CELL); }
  else { cx = b.col; cy = b.row; }

  let blastCells = [{ c: cx, r: cy }];
  for (let d = 0; d < 4; d++) {
    for (let i = 1; i <= BLAST_RANGE; i++) {
      const nc = cx + [0, 0, -1, 1][d] * i;
      const nr = cy + [-1, 1, 0, 0][d] * i;
      if (cellActive(nr, nc)) blastCells.push({ c: nc, r: nr });
      else break;
    }
  }

  blastCells.forEach(cell => {
    effects.push({ type: 'explosion', x: FIELD_X + cell.c * CELL + CELL / 2, y: FIELD_Y + cell.r * CELL + CELL / 2, time: 0.4 });
  });

  players.forEach(p => {
    if (!p.alive) return;
    const pg = playerGridPos(p);
    if (blastCells.some(cell => cell.c === pg.col && cell.r === pg.row)) {
      const ddx = p.x - (FIELD_X + cx * CELL + CELL / 2);
      const ddy = p.y - (FIELD_Y + cy * CELL + CELL / 2);
      if (Math.abs(ddx) > Math.abs(ddy)) p.dir = ddx > 0 ? 3 : 2;
      else p.dir = ddy > 0 ? 1 : 0;
      eliminatePlayer(p);
    }
  });

  bombs.forEach(ob => {
    if (ob === b || ob.timer <= -0.5) return;
    let oc, or2;
    if (ob.flying) { oc = Math.floor((ob.fx - FIELD_X) / CELL); or2 = Math.floor((ob.fy - FIELD_Y) / CELL); }
    else { oc = ob.col; or2 = ob.row; }
    if (blastCells.some(cell => cell.c === oc && cell.r === or2)) ob.timer = 0.05;
  });
}

// ============================================
// CPU AI
// ============================================
function updateCPU(p, dt) {
  if (!p.alive || !p.isCpu) return;
  if (!p._aiTimer) p._aiTimer = 0;
  if (!p._aiAction) p._aiAction = { dx: 0, dy: 0, bomb: false, charge: false };
  p._aiTimer -= dt;

  if (p._aiTimer <= 0) {
    p._aiTimer = 0.3 + Math.random() * 0.4;
    const g = playerGridPos(p);
    const action = { dx: 0, dy: 0, bomb: false, charge: false };

    let inDanger = false, dangerDir = -1;
    bombs.forEach(b => {
      if (b.flying) return;
      for (let d = 0; d < 4; d++) {
        for (let i = 0; i <= BLAST_RANGE; i++) {
          const bc = b.col + [0, 0, -1, 1][d] * i;
          const br = b.row + [-1, 1, 0, 0][d] * i;
          if (bc === g.col && br === g.row && b.timer < 2.0) {
            inDanger = true;
            dangerDir = d <= 1 ? (Math.random() > 0.5 ? 2 : 3) : (Math.random() > 0.5 ? 0 : 1);
          }
        }
      }
    });

    if (inDanger && dangerDir >= 0) {
      action.dx = [0, 0, -1, 1][dangerDir]; action.dy = [-1, 1, 0, 0][dangerDir];
    } else {
      let nearest = null, nearDist = Infinity;
      players.forEach(t => {
        if (t === p || !t.alive) return;
        const d = Math.abs(t.x - p.x) + Math.abs(t.y - p.y);
        if (d < nearDist) { nearDist = d; nearest = t; }
      });
      if (nearest) {
        if (nearDist < CELL * 2) {
          action.charge = true;
          if (p.chargeTime > MAX_CHARGE * 0.8) action.charge = false;
        } else if (nearDist < CELL * 4) {
          if (Math.random() < 0.3) action.bomb = true;
          const ddx = nearest.x - p.x, ddy = nearest.y - p.y;
          if (Math.abs(ddx) > Math.abs(ddy)) action.dx = ddx > 0 ? 1 : -1;
          else action.dy = ddy > 0 ? 1 : -1;
        } else {
          const ddx = nearest.x - p.x, ddy = nearest.y - p.y;
          if (Math.abs(ddx) > Math.abs(ddy)) action.dx = ddx > 0 ? 1 : -1;
          else action.dy = ddy > 0 ? 1 : -1;
        }
      }
    }
    const ml = (shrinkLevel + 1) * CELL + FIELD_X, mr = FIELD_X + (12 - shrinkLevel) * CELL;
    const mt = (shrinkLevel + 1) * CELL + FIELD_Y, mb = FIELD_Y + (12 - shrinkLevel) * CELL;
    if (p.x < ml + CELL) action.dx = 1; if (p.x > mr - CELL) action.dx = -1;
    if (p.y < mt + CELL) action.dy = 1; if (p.y > mb - CELL) action.dy = -1;
    p._aiAction = action;
  }

  const a = p._aiAction;
  const inp = { up: a.dy < 0, down: a.dy > 0, left: a.dx < 0, right: a.dx > 0, bomb: a.bomb, charging: a.charge, chargeTime: p.chargeTime };
  if (!a.charge && p.charging && p.chargeTime > 0) { inp.charging = false; }
  updatePlayer(p, dt, inp);
  if (a.bomb) a.bomb = false;
}

// ============================================
// EFFECTS
// ============================================
function updateEffects(dt) {
  effects.forEach(e => e.time -= dt);
  effects = effects.filter(e => e.time > 0);
}

// ============================================
// RENDERER
// ============================================
function render() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, 800, 600);
  if (!field.length || (!gameRunning && players.length === 0)) return;
  drawField(); drawBombs(); drawPlayers(); drawEffects(); drawHUD();
}

function drawField() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = FIELD_X + c * CELL, y = FIELD_Y + r * CELL;
      if (field[r][c] === 2) {
        ctx.fillStyle = '#0a0a0a'; ctx.fillRect(x, y, CELL, CELL);
      } else if (field[r][c] === 1) {
        const blink = Math.sin(gameTime * 8) > 0;
        ctx.fillStyle = blink ? '#661a1a' : '#2a3a2a'; ctx.fillRect(x, y, CELL, CELL);
        ctx.strokeStyle = blink ? '#992222' : '#3a4a3a'; ctx.strokeRect(x + 0.5, y + 0.5, CELL - 1, CELL - 1);
      } else {
        ctx.fillStyle = (r + c) % 2 === 0 ? '#2a3a2a' : '#253525'; ctx.fillRect(x, y, CELL, CELL);
        ctx.strokeStyle = '#3a4a3a'; ctx.strokeRect(x + 0.5, y + 0.5, CELL - 1, CELL - 1);
      }
    }
  }
  const bl = shrinkLevel;
  ctx.strokeStyle = '#f84'; ctx.lineWidth = 2;
  ctx.strokeRect(FIELD_X + bl * CELL, FIELD_Y + bl * CELL, (13 - bl * 2) * CELL, (13 - bl * 2) * CELL);
  ctx.lineWidth = 1;
}

function drawBombs() {
  bombs.forEach(b => {
    let bx, by;
    if (b.flying) { bx = b.fx; by = b.fy; }
    else { bx = FIELD_X + b.col * CELL + CELL / 2; by = FIELD_Y + b.row * CELL + CELL / 2; }

    if (!b.flying && b.timer <= BOMB_WARN && b.timer > 0) {
      const blink = Math.sin(gameTime * 12) > 0;
      if (blink) {
        ctx.fillStyle = 'rgba(255,60,30,0.25)';
        for (let d = 0; d < 4; d++) {
          for (let i = 1; i <= BLAST_RANGE; i++) {
            const nc = b.col + [0, 0, -1, 1][d] * i, nr = b.row + [-1, 1, 0, 0][d] * i;
            if (cellActive(nr, nc)) ctx.fillRect(FIELD_X + nc * CELL, FIELD_Y + nr * CELL, CELL, CELL);
          }
        }
        ctx.fillRect(FIELD_X + b.col * CELL, FIELD_Y + b.row * CELL, CELL, CELL);
      }
    }

    const pulse = 1 + Math.sin(gameTime * 6) * 0.1, sz = 14 * pulse;
    ctx.fillStyle = b.timer < 1 ? '#ff4422' : '#333';
    ctx.beginPath(); ctx.arc(bx, by, sz, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#666'; ctx.lineWidth = 2; ctx.stroke(); ctx.lineWidth = 1;
    ctx.strokeStyle = '#fa0'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(bx, by - sz); ctx.lineTo(bx + 4, by - sz - 8); ctx.stroke();
    if (b.timer > 0) { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(bx + 4, by - sz - 8, 3 + Math.random() * 2, 0, Math.PI * 2); ctx.fill(); }
    ctx.lineWidth = 1;
    ctx.fillStyle = COLORS[b.owner]; ctx.fillRect(bx - 3, by - 3, 6, 6);
  });
}

function drawPlayers() {
  players.forEach(p => {
    if (!p.alive && p.eliminateAnim <= 0) return;
    ctx.globalAlpha = p.alive ? 1 : Math.max(0, p.eliminateAnim);
    const x = p.x, y = p.y, color = COLORS[p.idx], s = PLAYER_SIZE, hs = s / 2;

    if (p.stunTime > 0) {
      ctx.save(); ctx.strokeStyle = '#ff0'; ctx.lineWidth = 2; ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.arc(x, y, hs + 4, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    }

    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(x - hs + 2, y - hs + 2, s, s);
    ctx.fillStyle = color; ctx.fillRect(x - hs, y - hs, s, s);
    ctx.fillStyle = lighten(color, 30); ctx.fillRect(x - hs + 4, y - hs + 4, s - 8, s - 8);

    ctx.fillStyle = '#fff';
    const ez = 4;
    let ex1, ey1, ex2, ey2;
    switch (p.dir) {
      case 0: ex1=x-5;ey1=y-6;ex2=x+3;ey2=y-6; break;
      case 1: ex1=x-5;ey1=y+2;ex2=x+3;ey2=y+2; break;
      case 2: ex1=x-7;ey1=y-5;ex2=x-7;ey2=y+3; break;
      case 3: ex1=x+3;ey1=y-5;ex2=x+3;ey2=y+3; break;
    }
    ctx.fillRect(ex1, ey1, ez, ez); ctx.fillRect(ex2, ey2, ez, ez);
    ctx.fillStyle = '#111';
    ctx.fillRect(ex1+1, ey1+1, 2, 2); ctx.fillRect(ex2+1, ey2+1, 2, 2);

    ctx.fillStyle = '#fff';
    const indD = hs + 4, ix = x + DIR_DX[p.dir] * indD, iy = y + DIR_DY[p.dir] * indD;
    ctx.beginPath();
    if (p.dir===0){ctx.moveTo(ix,iy-3);ctx.lineTo(ix-3,iy+2);ctx.lineTo(ix+3,iy+2);}
    if (p.dir===1){ctx.moveTo(ix,iy+3);ctx.lineTo(ix-3,iy-2);ctx.lineTo(ix+3,iy-2);}
    if (p.dir===2){ctx.moveTo(ix-3,iy);ctx.lineTo(ix+2,iy-3);ctx.lineTo(ix+2,iy+3);}
    if (p.dir===3){ctx.moveTo(ix+3,iy);ctx.lineTo(ix-2,iy-3);ctx.lineTo(ix-2,iy+3);}
    ctx.fill();

    if (p.charging && p.chargeTime > 0) {
      const barW = 30, ratio = p.chargeTime / MAX_CHARGE;
      ctx.fillStyle = '#333'; ctx.fillRect(x - barW/2, y - hs - 12, barW, 6);
      ctx.fillStyle = ratio >= 0.95 ? '#f0f' : ratio > 0.5 ? '#fa0' : '#0f0';
      ctx.fillRect(x - barW/2, y - hs - 12, barW * ratio, 6);
      ctx.strokeStyle = '#fff'; ctx.strokeRect(x - barW/2, y - hs - 12, barW, 6);
      if (ratio >= 0.95) {
        ctx.fillStyle = '#f0f'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
        ctx.fillText('MAX!', x, y - hs - 16); ctx.textAlign = 'left';
      }
    }

    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
    ctx.fillText(p.isCpu ? 'CPU' : 'P' + (p.idx + 1), x, y + hs + 14);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  });
}

function drawEffects() {
  effects.forEach(e => {
    ctx.globalAlpha = Math.max(0, e.time / 0.5);
    if (e.type === 'explosion') {
      ctx.fillStyle = '#ff8800'; ctx.fillRect(e.x - CELL/2, e.y - CELL/2, CELL, CELL);
      ctx.fillStyle = '#ffcc00'; ctx.fillRect(e.x - CELL/4, e.y - CELL/4, CELL/2, CELL/2);
    }
    if (e.type === 'swing') {
      ctx.strokeStyle = e.charge >= 0.95 ? '#ff00ff' : '#ffffff'; ctx.lineWidth = 3;
      ctx.beginPath();
      if (e.dir===0) ctx.arc(e.x,e.y,BAT_RANGE*CELL,-Math.PI*0.8,-Math.PI*0.2);
      if (e.dir===1) ctx.arc(e.x,e.y,BAT_RANGE*CELL,Math.PI*0.2,Math.PI*0.8);
      if (e.dir===2) ctx.arc(e.x,e.y,BAT_RANGE*CELL,Math.PI*0.7,Math.PI*1.3);
      if (e.dir===3) ctx.arc(e.x,e.y,BAT_RANGE*CELL,-Math.PI*0.3,Math.PI*0.3);
      ctx.stroke(); ctx.lineWidth = 1;
    }
    if (e.type === 'hit') {
      ctx.fillStyle='#fff';ctx.font='bold 18px monospace';ctx.textAlign='center';
      ctx.fillText('HIT!',e.x,e.y-20);ctx.textAlign='left';
    }
    if (e.type === 'elim') {
      ctx.fillStyle='#f44';ctx.font='bold 16px monospace';ctx.textAlign='center';
      ctx.fillText('OUT!',e.x,e.y-30);ctx.textAlign='left';
    }
    ctx.globalAlpha = 1;
  });
}

function drawHUD() {
  ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
  ctx.fillText('TIME: ' + Math.floor(gameTime) + 's', 10, 20);
  ctx.fillText('SHRINK: ' + Math.max(0, Math.floor(SHRINK_INTERVAL - shrinkTimer)) + 's', 10, 38);
  players.forEach((p, i) => {
    const sx = 300 + i * 100;
    ctx.fillStyle = p.alive ? COLORS[i] : '#555'; ctx.fillRect(sx, 4, 12, 12);
    ctx.fillStyle = '#fff'; ctx.font = '12px monospace';
    ctx.fillText((p.isCpu ? 'CPU' : 'P' + (i+1)) + (p.alive ? '' : ' OUT'), sx + 16, 14);
  });
}

function lighten(hex, amt) {
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return '#'+[Math.min(255,r+amt),Math.min(255,g+amt),Math.min(255,b+amt)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ============================================
// NETWORK (PeerJS)
// ============================================
function generateRoomCode() {
  return String(Math.floor(1000 + Math.random() * 9000));
}

function netHost() {
  const code = generateRoomCode();
  document.getElementById('lobbyChoice').style.display = 'none';
  document.getElementById('lobbyHostView').style.display = 'block';
  document.getElementById('roomCodeDisplay').textContent = code;
  document.getElementById('hostStatus').textContent = '接続待ち...';
  document.getElementById('hostStatus').className = 'status wait';

  netRole = 'host';
  netConns = [];
  remoteInputs = {};
  const needed = onlinePlayers - 1;

  peer = new Peer('batbattle-' + code);
  peer.on('error', (err) => {
    document.getElementById('hostStatus').textContent = 'エラー: ' + err.type;
    document.getElementById('hostStatus').className = 'status err';
  });
  peer.on('open', () => {
    document.getElementById('hostStatus').textContent = '部屋作成完了！ 接続待ち... (0/' + needed + ')';
  });
  peer.on('connection', (conn) => {
    const guestIdx = netConns.length + 1;
    const info = { conn, guestIdx, ready: false };
    netConns.push(info);

    conn.on('open', () => {
      info.ready = true;
      const count = netConns.filter(c => c.ready).length;
      document.getElementById('hostStatus').textContent = '接続済み: ' + count + '/' + needed;
      document.getElementById('hostStatus').className = count >= needed ? 'status ok' : 'status wait';
      if (count >= needed) document.getElementById('btnStart').style.display = 'block';
    });
    conn.on('data', (data) => {
      if (data.type === 'input') remoteInputs[guestIdx] = data.input;
      if (data.type === 'rematch') {
        rematchVotes.add(guestIdx);
        checkRematchAll();
      }
    });
    conn.on('close', () => { info.ready = false; });
  });
}

function netJoinUI() {
  document.getElementById('lobbyChoice').style.display = 'none';
  document.getElementById('lobbyJoinView').style.display = 'block';
  document.getElementById('joinStatus').textContent = '';
  netRole = 'guest';
}

function netJoinRoom() {
  const code = document.getElementById('roomCodeInput').value.trim();
  if (code.length !== 4) {
    document.getElementById('joinStatus').textContent = '4桁のコードを入力してください';
    document.getElementById('joinStatus').className = 'status err';
    return;
  }

  document.getElementById('joinStatus').textContent = '接続中...';
  document.getElementById('joinStatus').className = 'status wait';

  peer = new Peer();
  peer.on('open', () => {
    const conn = peer.connect('batbattle-' + code);
    netConns = [{ conn, ready: false }];

    conn.on('open', () => {
      netConns[0].ready = true;
      document.getElementById('joinStatus').textContent = '接続完了！ホストがゲームを開始するのを待っています...';
      document.getElementById('joinStatus').className = 'status ok';
    });
    conn.on('data', (data) => {
      if (data.type === 'start') {
        gameMode = 'online-guest';
        localPlayerIdx = data.yourIdx;
        playerCount = data.playerCount;
        hideAllScreens();
        gameRunning = true;
      }
      if (data.type === 'state') applyRemoteState(data);
      if (data.type === 'gameover') showResult(data.winnerLabel, data.winnerColor);
      if (data.type === 'rematch') {
        hideAllScreens();
        gameRunning = true;
      }
    });
    conn.on('close', () => {
      document.getElementById('joinStatus').textContent = 'ホストとの接続が切れました';
      document.getElementById('joinStatus').className = 'status err';
    });
    conn.on('error', () => {
      document.getElementById('joinStatus').textContent = '接続エラー';
      document.getElementById('joinStatus').className = 'status err';
    });
  });
  peer.on('error', (err) => {
    if (err.type === 'peer-unavailable') {
      document.getElementById('joinStatus').textContent = '部屋が見つかりません。コードを確認してください。';
    } else {
      document.getElementById('joinStatus').textContent = 'エラー: ' + err.type;
    }
    document.getElementById('joinStatus').className = 'status err';
  });
}

function netStartGame() {
  gameMode = 'online-host';
  localPlayerIdx = 0;
  initGame(onlinePlayers, false);
  hideAllScreens();
  netConns.forEach((c, i) => {
    if (c.ready) c.conn.send({ type: 'start', yourIdx: i + 1, playerCount: onlinePlayers });
  });
}

function broadcastState() {
  if (netRole !== 'host') return;
  const state = {
    type: 'state',
    players: players.map(p => ({
      x:p.x,y:p.y,dir:p.dir,alive:p.alive,charging:p.charging,
      chargeTime:p.chargeTime,stunTime:p.stunTime,knockback:p.knockback,
      kbVx:p.kbVx,kbVy:p.kbVy,kbTime:p.kbTime,eliminateAnim:p.eliminateAnim,
      isCpu:p.isCpu,idx:p.idx
    })),
    bombs: bombs.map(b => ({ owner:b.owner,col:b.col,row:b.row,timer:b.timer,flying:b.flying,fx:b.fx,fy:b.fy,flyDir:b.flyDir })),
    field, shrinkLevel, shrinkTimer, gameTime,
    effects: effects.slice(-10).map(e => ({ type:e.type,x:e.x,y:e.y,time:e.time,charge:e.charge,dir:e.dir }))
  };
  netConns.forEach(c => { if (c.ready) try { c.conn.send(state); } catch(e){} });
}

function sendInputToHost() {
  if (netRole !== 'guest' || !netConns[0] || !netConns[0].ready) return;
  const inp = getLocalInput(0);
  try { netConns[0].conn.send({ type: 'input', input: inp }); } catch(e) {}
}

function applyRemoteState(data) {
  if (data.players) {
    while (players.length < data.players.length) players.push(createPlayer(players.length, 0, 0, false));
    players.length = data.players.length;
    data.players.forEach((rp, i) => Object.assign(players[i], rp));
  }
  if (data.bombs) bombs = data.bombs;
  if (data.field) field = data.field;
  if (data.shrinkLevel !== undefined) shrinkLevel = data.shrinkLevel;
  if (data.shrinkTimer !== undefined) shrinkTimer = data.shrinkTimer;
  if (data.gameTime !== undefined) gameTime = data.gameTime;
  if (data.effects) effects = data.effects;
}

function broadcastGameover(winnerLabel, winnerColor) {
  netConns.forEach(c => {
    if (c.ready) try { c.conn.send({ type: 'gameover', winnerLabel, winnerColor }); } catch(e){}
  });
}

// ============================================
// GAME MANAGER
// ============================================
function initGame(numPlayers, withCPU) {
  players = []; bombs = []; effects = [];
  gameTime = 0; initField();
  const spawns = [{ col:2,row:2 },{ col:10,row:10 },{ col:10,row:2 },{ col:2,row:10 }];
  for (let i = 0; i < numPlayers; i++) {
    players.push(createPlayer(i, spawns[i].col, spawns[i].row, withCPU && i >= 1));
  }
  gameRunning = true;
  mouseDown = false; mouseDownTime = 0; rightClicked = false;
  rematchVotes = new Set();
}

function checkWin() {
  const alive = players.filter(p => p.alive);
  if (alive.length <= 1) {
    gameRunning = false;
    const winner = alive[0];
    const label = winner ? (winner.isCpu ? 'CPU' : 'P' + (winner.idx + 1)) : null;
    const color = winner ? COLORS[winner.idx] : '#fff';
    const winLabel = label ? label + ' WIN!' : 'DRAW!';

    if (gameMode === 'online-host') broadcastGameover(winLabel, color);
    setTimeout(() => showResult(winLabel, color), 800);
  }
}

function showResult(text, color) {
  gameRunning = false;
  const el = document.getElementById('resultText');
  el.textContent = text;
  el.style.color = color;
  document.getElementById('btnRematch').style.display = 'inline-block';
  document.getElementById('rematchStatus').style.display = 'none';
  document.getElementById('resultScreen').classList.add('active');
}

function requestRematch() {
  if (gameMode === 'local') {
    // Local: just restart
    hideAllScreens();
    const withCPU = players.some(p => p.isCpu);
    initGame(players.length, withCPU);
  } else if (gameMode === 'online-host') {
    // Host: restart and notify guests
    hideAllScreens();
    initGame(onlinePlayers, false);
    netConns.forEach(c => { if (c.ready) try { c.conn.send({ type: 'rematch' }); } catch(e){} });
  } else if (gameMode === 'online-guest') {
    // Guest: request rematch from host
    document.getElementById('btnRematch').style.display = 'none';
    document.getElementById('rematchStatus').style.display = 'block';
    document.getElementById('rematchStatus').textContent = 'ホストの再戦を待っています...';
    document.getElementById('rematchStatus').className = 'status wait';
    try { netConns[0].conn.send({ type: 'rematch' }); } catch(e){}
  }
}

function checkRematchAll() {
  // Host checks if all guests want rematch (optional: auto-rematch)
}

function quitToTitle() {
  showTitle();
}

// ============================================
// GAME LOOP
// ============================================
function gameLoop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  if (gameRunning) {
    if (gameMode === 'online-guest') {
      sendInputToHost();
      // Reset one-shot inputs for guest too
      rightClicked = false;
      if (!mouseDown && mouseDownTime > 0) mouseDownTime = 0;
      render();
    } else {
      gameTime += dt;
      if (mouseDown) mouseDownTime += dt;

      updateField(dt);

      players.forEach((p, i) => {
        if (p.isCpu) {
          updateCPU(p, dt);
        } else if (gameMode === 'local') {
          updatePlayer(p, dt, getLocalInput(i));
        } else if (gameMode === 'online-host') {
          if (i === 0) {
            updatePlayer(p, dt, getLocalInput(0));
          } else {
            const ri = remoteInputs[i] || {};
            updatePlayer(p, dt, ri);
            // Reset one-shot bomb input after processing
            if (ri.bomb) ri.bomb = false;
          }
        }
      });

      rightClicked = false;
      if (!mouseDown && mouseDownTime > 0) mouseDownTime = 0;

      // Local P2/P3 keyboard charge tracking
      if (gameMode === 'local') {
        for (let i = 1; i < players.length; i++) {
          if (players[i].isCpu) continue;
          const inp = getLocalInput(i);
          if (!inp.charging && players[i].charging && players[i].chargeTime > 0) {
            performSwing(players[i]);
            players[i].charging = false; players[i].chargeTime = 0;
          }
        }
      }

      updateBombs(dt);
      updateEffects(dt);
      checkWin();

      if (gameMode === 'online-host') {
        netSyncTimer += dt;
        if (netSyncTimer >= 1/30) { broadcastState(); netSyncTimer = 0; }
      }
      render();
    }
  } else {
    render();
  }
  requestAnimationFrame(gameLoop);
}

// ============================================
// SCREEN MANAGEMENT
// ============================================
function hideAllScreens() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
}

function showTitle() {
  hideAllScreens();
  document.getElementById('titleScreen').classList.add('active');
  gameRunning = false;
  // Reset lobby
  document.getElementById('lobbyChoice').style.display = 'block';
  document.getElementById('lobbyHostView').style.display = 'none';
  document.getElementById('lobbyJoinView').style.display = 'none';
  document.getElementById('btnStart').style.display = 'none';
  // Cleanup peer
  if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
  netConns = []; netRole = null; remoteInputs = {};
}

function startLocal(num) {
  hideAllScreens();
  gameMode = 'local';
  playerCount = num;
  initGame(num === 1 ? 2 : num, num === 1);
}

function showLobby(num) {
  hideAllScreens();
  onlinePlayers = num;
  document.getElementById('lobbyScreen').classList.add('active');
  document.getElementById('lobbyChoice').style.display = 'block';
  document.getElementById('lobbyHostView').style.display = 'none';
  document.getElementById('lobbyJoinView').style.display = 'none';
}

// ============================================
// START
// ============================================
initField();
lastTs = performance.now();
requestAnimationFrame(gameLoop);
</script>
